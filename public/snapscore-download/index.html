<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to SnapScore...</title>
  <style>
    body {
      background-color: #030712;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #06b6d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .fallback-links {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      width: 220px;
      box-sizing: border-box;
    }
    .btn-apple {
      background-color: #1f2937;
      color: #f3f4f6;
      border: 1px solid #374151;
    }
    .btn-apple:hover {
      background-color: #374151;
    }
    .btn-google {
      background-color: #0284c7;
      color: #ffffff;
      border: 1px solid #0369a1;
    }
    .btn-google:hover {
      background-color: #0369a1;
    }
  </style>
  <script>
    const iosUrl = "https://apps.apple.com/in/app/snapscore-choose-best-pic-ai/id6777499678";
    const androidUrl = "https://play.google.com/store/apps/details?id=com.harshakrishnak.snapscore";

    function performRedirect() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(userAgent);
      const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

      let redirectUrl = iosUrl; // Default fallback to iOS App Store
      let storeName = "App Store";

      if (isAndroid) {
        redirectUrl = androidUrl;
        storeName = "Google Play Store";
      }

      document.getElementById("status-text").innerText = "Redirecting you to SnapScore on the " + storeName + "...";
      
      // Execute redirection
      window.location.href = redirectUrl;
    }

    window.onload = performRedirect;
  </script>
</head>
<body>
  <div class="spinner"></div>
  <h1 id="status-text">Detecting your device and redirecting...</h1>
  
  <div class="fallback-links">
    <p style="font-size: 13px; color: #9ca3af; margin-bottom: 5px;">If you are not redirected automatically, select your platform below:</p>
    <a href="https://apps.apple.com/in/app/snapscore-choose-best-pic-ai/id6777499678" class="btn btn-apple">
       Download for iOS
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.harshakrishnak.snapscore" class="btn btn-google">
      ▶ Download for Android
    </a>
  </div>
</body>
</html>
